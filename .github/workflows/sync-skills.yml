name: Sync skills to August AI

# Whenever the marketplace manifest or any plugin changes on main, push the
# catalog to the August AI site's Supabase `skills` table. Also runnable on
# demand from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**'
      - 'scripts/sync-skills.mjs'
      - '.github/workflows/sync-skills.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync marketplace.json -> Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # Service-role / secret key is stored in the repo secret named SKILL_SYNC.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SKILL_SYNC }}
        run: node scripts/sync-skills.mjs
